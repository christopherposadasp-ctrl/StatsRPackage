name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(awk -F ': ' '$1 == "Version" { print $2 }' StatsPackage/DESCRIPTION)"
          if [[ "${GITHUB_REF_NAME}" != "${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            exit 1
          fi

      - name: Setup R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          working-directory: StatsPackage
          extra-packages: |
            any::devtools
            any::remotes
            any::testthat
            any::knitr
            any::rmarkdown
          needs: check

      - name: Run tests
        working-directory: StatsPackage
        run: Rscript -e "devtools::test('.')"

      - name: Verify generated documentation
        working-directory: StatsPackage
        run: |
          Rscript -e "devtools::document('.')"
          git diff --exit-code -- DESCRIPTION NAMESPACE man

      - name: Run check
        working-directory: StatsPackage
        run: Rscript -e "devtools::check('.', error_on = 'note', args = c('--no-manual'))"

      - name: Run cheat-sheet audit
        run: Rscript scripts/qa_cheatsheet_audit.R

      - name: Run release smoke test
        run: Rscript scripts/qa_smoke_release.R

      - name: Build source package
        shell: Rscript {0}
        run: |
          dir.create("dist", showWarnings = FALSE, recursive = TRUE)
          built <- devtools::build("StatsPackage", path = "dist")
          cat("Built package:", built, "\n")

      - name: Build checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          if-no-files-found: warn
          path: |
            dist/*
            qa/cheatsheet_audit_output.txt
            qa/cheatsheet_audit_issues.csv
            qa/smoke_test_output.txt
            qa/smoke_test_results.csv

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            dist/*
            qa/cheatsheet_audit_output.txt
            qa/cheatsheet_audit_issues.csv
