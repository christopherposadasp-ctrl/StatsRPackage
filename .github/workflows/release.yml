name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: StatsPackage -1.0
          extra-packages: |
            any::devtools
            any::remotes
            any::testthat
            any::knitr
            any::rmarkdown
          needs: check

      - name: Run tests
        working-directory: StatsPackage -1.0
        run: Rscript -e "devtools::test('.')"

      - name: Run check
        working-directory: StatsPackage -1.0
        run: Rscript -e "devtools::check('.', error_on = 'error', args = c('--no-manual'))"

      - name: Run cheat-sheet audit
        run: Rscript scripts/qa_cheatsheet_audit.R

      - name: Build source package
        shell: Rscript {0}
        run: |
          dir.create("dist", showWarnings = FALSE, recursive = TRUE)
          built <- devtools::build("StatsPackage -1.0", path = "dist")
          cat("Built package:", built, "\n")

      - name: Build checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          if-no-files-found: warn
          path: |
            dist/*
            qa/cheatsheet_audit_output.txt
            qa/cheatsheet_audit_issues.csv

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            qa/cheatsheet_audit_output.txt
            qa/cheatsheet_audit_issues.csv
