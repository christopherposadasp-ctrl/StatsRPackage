name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lintr:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: StatsPackage -1.0
          extra-packages: |
            any::lintr
          needs: lint

      - name: Run lintr
        working-directory: StatsPackage -1.0
        run: |
          Rscript -e "lintr::lint_dir('R')"
