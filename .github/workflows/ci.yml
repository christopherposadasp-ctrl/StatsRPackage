name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  r-quality:
    name: "${{ matrix.os }} / R-${{ matrix.r }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            r: release
          - os: ubuntu-latest
            r: devel
          - os: windows-latest
            r: release
          - os: macos-latest
            r: release

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup R
        uses: r-lib/actions/setup-r@929c772977a3a13c8733b363bf5a2f685c25dd91 # v2.9.0
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@929c772977a3a13c8733b363bf5a2f685c25dd91 # v2.9.0
        with:
          working-directory: StatsPackage
          extra-packages: |
            any::devtools
            any::remotes
            any::testthat
            any::knitr
            any::rmarkdown
          needs: check

      - name: Run tests
        working-directory: StatsPackage
        run: Rscript -e "devtools::test('.')"

      - name: Verify generated documentation
        working-directory: StatsPackage
        run: |
          Rscript -e "devtools::document('.')"
          git diff --exit-code -- DESCRIPTION NAMESPACE man

      - name: Run check
        working-directory: StatsPackage
        run: Rscript -e "devtools::check('.', error_on = 'note', args = c('--no-manual'))"

      - name: Run cheat-sheet audit
        if: matrix.os == 'ubuntu-latest' && matrix.r == 'release'
        run: Rscript scripts/qa_cheatsheet_audit.R

      - name: Run release smoke test
        if: matrix.os == 'ubuntu-latest' && matrix.r == 'release'
        run: Rscript scripts/qa_smoke_release.R

      - name: Upload audit artifacts
        if: always() && matrix.os == 'ubuntu-latest' && matrix.r == 'release'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cheatsheet-audit
          if-no-files-found: error
          path: |
            qa/cheatsheet_audit_output.txt
            qa/cheatsheet_audit_issues.csv
            qa/smoke_test_output.txt
            qa/smoke_test_results.csv
