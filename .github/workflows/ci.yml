name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  r-quality:
    name: "${{ matrix.os }} / R-${{ matrix.r }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            r: release
          - os: ubuntu-latest
            r: devel
          - os: windows-latest
            r: release
          - os: macos-latest
            r: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: StatsPackage -1.0
          extra-packages: |
            any::devtools
            any::remotes
            any::testthat
            any::knitr
            any::rmarkdown
          needs: check

      - name: Run tests
        working-directory: StatsPackage -1.0
        run: Rscript -e "devtools::test('.')"

      - name: Run check
        working-directory: StatsPackage -1.0
        run: Rscript -e "devtools::check('.', error_on = 'error', args = c('--no-manual'))"

      - name: Run cheat-sheet audit
        if: matrix.os == 'ubuntu-latest' && matrix.r == 'release'
        run: Rscript scripts/qa_cheatsheet_audit.R

      - name: Upload audit artifacts
        if: always() && matrix.os == 'ubuntu-latest' && matrix.r == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: cheatsheet-audit
          if-no-files-found: warn
          path: |
            qa/cheatsheet_audit_output.txt
            qa/cheatsheet_audit_issues.csv
