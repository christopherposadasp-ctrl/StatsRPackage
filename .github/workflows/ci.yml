name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  r-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          install.packages(
            c("devtools", "remotes", "testthat"),
            repos = "https://cloud.r-project.org"
          )

      - name: Run tests
        run: Rscript -e "devtools::test('StatsPackage -1.0')"

      - name: Run check
        run: Rscript -e "devtools::check('StatsPackage -1.0', error_on = 'error', args = c('--no-manual'))"

      - name: Run cheat-sheet audit
        run: Rscript scripts/qa_cheatsheet_audit.R

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cheatsheet-audit
          if-no-files-found: warn
          path: |
            qa/cheatsheet_audit_output.txt
            qa/cheatsheet_audit_issues.csv

